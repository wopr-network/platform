name: Bug Report
+description: Report a bug to help us improve NemoClaw
labels: ["status: triage"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: 1. Run 'nemo'... 2. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Traceback
      render: shell
    validations:
      required: true
