name: Docs Links PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "**/*.md"
      - ".github/workflows/docs-links-pr.yaml"
      - "test/e2e/e2e-cloud-experimental/check-docs.sh"

permissions:
  contents: read

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine changed markdown files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t md_files < <(
            git diff --name-only --diff-filter=ACMR "$base" "$head" -- \
              '*.md' \
              ':(exclude)node_modules/**' \
              ':(exclude)dist/**' \
              ':(exclude)vendor/**' \
              ':(exclude)build/**' \
            | LC_ALL=C sort -u
          )

          if [[ "${#md_files[@]}" -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            printf '%s\n' "${md_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run markdown link checker
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t md_files <<< "${{ steps.changed.outputs.files }}"
          bash test/e2e/e2e-cloud-experimental/check-docs.sh --only-links --local-only "${md_files[@]}"
