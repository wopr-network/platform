preset:
  name: npm
  description: "npm and Yarn registry access"

network_policies:
  npm_yarn:
    name: npm_yarn
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
      - host: registry.yarnpkg.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/npm* }
      - { path: /usr/local/bin/npx* }
      - { path: /usr/local/bin/node* }
      - { path: /usr/local/bin/yarn* }
      - { path: /usr/bin/npm* }
      - { path: /usr/bin/node* }
