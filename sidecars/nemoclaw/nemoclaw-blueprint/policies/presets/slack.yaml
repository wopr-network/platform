preset:
  name: slack
  description: "Slack API, Socket Mode, and webhooks access"

network_policies:
  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # Socket Mode WebSocket — requires CONNECT tunnel to avoid
      # HTTP idle timeout killing the persistent connection. See #409.
      - host: wss-primary.slack.com
        port: 443
        access: full
      - host: wss-backup.slack.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }
