services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nemoclaw_platform
      POSTGRES_USER: nemoclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemoclaw -d nemoclaw_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  nemoclaw-platform:
    image: registry.wopr.bot/nemoclaw-platform:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Vault secrets management (zero secrets in compose)
      - VAULT_ADDR=https://vault.wopr.bot
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      # Infra config (non-secret)
      - DB_HOST=postgres
      - DB_NAME=nemoclaw_platform
      - PORT=3100
      - PLATFORM_DOMAIN=nemopod.com
      - BETTER_AUTH_URL=https://api.nemopod.com
      - NEMOCLAW_IMAGE=${NEMOCLAW_IMAGE:-registry.wopr.bot/nemoclaw:latest}
      - NEMOCLAW_CONTAINER_PORT=3100
      - FLEET_DOCKER_NETWORK=nemoclaw-platform_default
      - GATEWAY_URL=https://api.nemopod.com/v1
      - POOL_SIZE_DEFAULT=2
      - EMAIL_FROM=${EMAIL_FROM:-noreply@nemopod.com}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NODE_ENV=production
    volumes:
      - fleet_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3100/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  nemoclaw-ui:
    image: registry.wopr.bot/nemoclaw-platform-ui:latest
    restart: unless-stopped
    depends_on:
      nemoclaw-platform:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=https://api.nemopod.com
      - BETTER_AUTH_URL=https://api.nemopod.com
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  fleet_data:
  caddy_data:
  caddy_config:
