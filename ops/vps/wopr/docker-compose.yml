services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=wopr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_DB=wopr_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wopr"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      platform-api:
        condition: service_healthy
      platform-ui:
        condition: service_healthy
    environment:
      - DOMAIN=wopr.bot
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    restart: unless-stopped

  platform-api:
    image: registry.wopr.bot/wopr-platform:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - platform_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Vault secrets management (zero secrets in compose)
      - VAULT_ADDR=https://vault.wopr.bot
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      # Infra config (non-secret)
      - DB_HOST=postgres
      - DB_NAME=wopr_platform
      - METER_WAL_PATH=/data/meter-wal.jsonl
      - METER_DLQ_PATH=/data/meter-dlq.jsonl
      - BETTER_AUTH_URL=https://api.wopr.bot
      - UI_ORIGIN=https://wopr.bot,https://app.wopr.bot
      - PLATFORM_DOMAIN=wopr.bot
      - COOKIE_DOMAIN=.wopr.bot
      - EMAIL_FROM=noreply@wopr.bot
      - WOPR_BOT_IMAGE=registry.wopr.bot/wopr:latest
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-172.16.0.0/12}
      - NODE_ENV=production
      - FLEET_API_TOKEN=${FLEET_API_TOKEN}
      - REGISTRY_USERNAME=wopr-network
      - REGISTRY_PASSWORD=${GHCR_TOKEN}
      - REGISTRY_SERVER=ghcr.io
      # Stripe price IDs (billing config — will move to DB later)
      - STRIPE_DEFAULT_PRICE_ID=${STRIPE_DEFAULT_PRICE_ID}
      - STRIPE_CREDIT_PRICE_5=${STRIPE_CREDIT_PRICE_5}
      - STRIPE_CREDIT_PRICE_10=${STRIPE_CREDIT_PRICE_10}
      - STRIPE_CREDIT_PRICE_25=${STRIPE_CREDIT_PRICE_25}
      - STRIPE_CREDIT_PRICE_50=${STRIPE_CREDIT_PRICE_50}
      - STRIPE_CREDIT_PRICE_100=${STRIPE_CREDIT_PRICE_100}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  platform-ui:
    image: registry.wopr.bot/wopr-platform-ui:latest
    environment:
      - NEXT_PUBLIC_API_URL=https://api.wopr.bot
      - BETTER_AUTH_URL=https://api.wopr.bot
      - NEXT_PUBLIC_APP_DOMAIN=app.wopr.bot
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  platform_data:
  postgres_data:

networks:
  default:
    name: wopr-platform
