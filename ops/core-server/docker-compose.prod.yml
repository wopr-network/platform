## Consolidated core-server — production deployment.
##
## All 4 product brands on one box: WOPR, Paperclip, NemoPod, Holy Ship.
## Uses pre-built GHCR images (built by .github/workflows/build-core.yml).
##
## Usage:
##   cp .env.production .env
##   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - platform

  core:
    image: registry.wopr.bot/core-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: ${DATABASE_URL}
      CORE_ALLOWED_SERVICE_TOKENS: ${CORE_ALLOWED_SERVICE_TOKENS}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://api.wopr.bot
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CRYPTO_SERVICE_URL: ${CRYPTO_SERVICE_URL}
      CRYPTO_SERVICE_KEY: ${CRYPTO_SERVICE_KEY}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.16.0.0/12}
      # Vault — core resolves cloudflareCaddyDnsToken + other shared/* secrets
      # via AppRole at boot. Without VAULT_ADDR set, resolveSecrets() falls back
      # to dev-defaults (all cloudflare.* = null) and container.ts throws.
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${CORE_VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${CORE_VAULT_SECRET_ID}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - core_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - platform

  wopr-ui:
    image: registry.wopr.bot/wopr-ui:latest
    depends_on:
      core:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.wopr.bot
      INTERNAL_API_URL: http://core:3001
      CORE_SERVICE_TOKEN: ${WOPR_UI_SERVICE_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  paperclip-ui:
    image: registry.wopr.bot/paperclip-ui:latest
    depends_on:
      core:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.runpaperclip.com
      INTERNAL_API_URL: http://core:3001
      CORE_SERVICE_TOKEN: ${PAPERCLIP_UI_SERVICE_TOKEN}
      PORT: "3002"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  nemoclaw-ui:
    image: registry.wopr.bot/nemoclaw-ui:latest
    depends_on:
      core:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.nemopod.com
      INTERNAL_API_URL: http://core:3001
      CORE_SERVICE_TOKEN: ${NEMOCLAW_UI_SERVICE_TOKEN}
      PORT: "3003"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  holyship:
    image: registry.wopr.bot/holyship:latest
    depends_on:
      core:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3005"
      CORE_URL: http://core:3001
      CORE_SERVICE_TOKEN: ${HOLYSHIP_SERVICE_TOKEN}
      UI_ORIGIN: https://holyship.wtf
      APP_BASE_URL: https://api.holyship.wtf
      # Vault (secrets resolved at boot — no secrets in env)
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_ROLE_ID: ${HOLYSHIP_VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${HOLYSHIP_VAULT_SECRET_ID}
      # Non-secret config
      HOLYSHIP_WORKER_IMAGE: ${HOLYSHIP_WORKER_IMAGE:-registry.wopr.bot/holyshipper:managed}
      DOCKER_NETWORK: platform
      DB_HOST: postgres
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  holyship-ui:
    image: registry.wopr.bot/holyship-ui:latest
    depends_on:
      holyship:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.holyship.wtf
      INTERNAL_API_URL: http://holyship:3005
      INTERNAL_CORE_URL: http://core:3001
      CORE_SERVICE_TOKEN: ${HOLYSHIP_UI_SERVICE_TOKEN}
      PORT: "3004"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      core:
        condition: service_healthy
      wopr-ui:
        condition: service_healthy
      paperclip-ui:
        condition: service_healthy
      nemoclaw-ui:
        condition: service_healthy
      holyship:
        condition: service_healthy
      holyship-ui:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - platform

  # Node agent — drains `pending_operations` rows targeted at this host or
  # with `target = NULL` (creation-class ops). Without this service, core
  # enqueues bot.start / pool.warm / pool.list rows but nothing runs them
  # and execute() times out after 5 minutes. Required.
  #
  # First boot: mint a registration token from a healthy core via
  #   docker compose exec core node dist/bootstrap-agent.js
  # and set AGENT_REGISTRATION_TOKEN in /opt/core-server/.env, then
  #   docker compose up -d node-agent
  # The agent registers, persists credentials.json to the named volume, and
  # subsequent restarts reuse them — the token env var can be removed after.
  node-agent:
    image: registry.wopr.bot/node-agent:latest
    depends_on:
      core:
        condition: service_healthy
    # Agent runs as USER node inside the image. group_add gives the container
    # user access to the host docker.sock (owned by root:docker). HOST_DOCKER_GID
    # must match `stat -c '%g' /var/run/docker.sock` on the droplet.
    group_add:
      - ${HOST_DOCKER_GID}
    environment:
      PLATFORM_URL: http://core:3001
      REGISTRATION_TOKEN: ${AGENT_REGISTRATION_TOKEN:-}
      CREDENTIALS_PATH: /etc/wopr/credentials.json
      BACKUP_DIR: /backups
      # Registry credentials so the agent can pull private managed images.
      # Same env vars the core service already consumes — these are bootstrap
      # config for the host docker daemon, not application secrets.
      REGISTRY_USERNAME: ${REGISTRY_USERNAME}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      REGISTRY_SERVER: ${REGISTRY_SERVER}
      # Default docker network for spawned tenant containers — must match
      # the network core is on so `http://<container-name>:3100` resolves.
      DOCKER_NETWORK: ${DOCKER_NETWORK:-platform-overlay}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_credentials:/etc/wopr
      - agent_backups:/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - platform

networks:
  platform:
    name: platform
    driver: bridge

volumes:
  pgdata:
  core_data:
  caddy_data:
  caddy_config:
  agent_credentials:
  agent_backups:
