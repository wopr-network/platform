##
## Full local testing stack for Paperclip Platform.
##
## Runs: Postgres + platform API + dashboard + Caddy + BTCPay (crypto) + seed container
##
## Prerequisites:
##   1. cp .env.local.example .env.local   # fill in Stripe test keys + secrets
##   2. Build the managed Paperclip image:
##      docker build -t paperclip-managed:local -f ~/paperclip/Dockerfile.managed ~/paperclip
##   3. Start:
##      docker compose -f docker-compose.local.yml up --build
##
## Access (requires /etc/hosts: 127.0.0.1 runpaperclip.com app.runpaperclip.com api.runpaperclip.com):
##   Dashboard:  http://app.runpaperclip.com:8080
##   API:        http://api.runpaperclip.com:8080/health
##   Tenant:     http://{subdomain}.runpaperclip.com:8080
##   BTCPay:     http://localhost:14142 (admin UI — create store + API key here)
##   Caddy admin: http://localhost:2019
##   Postgres:   localhost:5433 (mapped from container 5432)
##

services:
  # --- Postgres (platform DB — auth, credits, billing) ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip-local}
      POSTGRES_DB: paperclip_platform
      # Create extra databases for nbxplorer + btcpayserver on first startup
      POSTGRES_MULTIPLE_DATABASES: nbxplorer,btcpayserver,paperclip_seed
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh:ro
    networks:
      - paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Paperclip Platform API (Hono) ---
  platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    env_file: .env.local
    environment:
      PORT: "3200"
      HOST: "0.0.0.0"
      NODE_ENV: development
      DATABASE_URL: postgresql://paperclip:${POSTGRES_PASSWORD:-paperclip-local}@postgres:5432/paperclip_platform
      # CADDY_ADMIN_URL intentionally omitted — .env.local sets it empty to
      # prevent ProxyManager /load calls from overwriting the Caddyfile wildcard.
      BETTER_AUTH_URL: http://api.runpaperclip.com:8080
      # BTCPay env vars come from .env.local (BTCPAY_API_KEY, BTCPAY_STORE_ID, etc.)
      # BTCPAY_BASE_URL is overridden here because the container uses the docker network name
      BTCPAY_BASE_URL: http://btcpay:23002
      # Stablecoin watcher connects to Anvil (Base fork) for local dev
      EVM_RPC_BASE: http://anvil:8545
      # BTC watcher connects to bitcoind directly (regtest)
      BITCOIND_RPC_URL: http://bitcoind:18443
      BITCOIND_RPC_USER: btcpay
      BITCOIND_RPC_PASSWORD: btcpay-local
      BITCOIND_NETWORK: regtest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - fleet-data:/data/fleet
    networks:
      - paperclip
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3200/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Dashboard (paperclip-platform-ui thin shell on platform-ui-core) ---
  dashboard:
    build:
      context: ../paperclip-platform-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api.runpaperclip.com:8080
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      PORT: "3000"
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api.runpaperclip.com:8080
      E2E_MOCK_API: "1"
    networks:
      - paperclip
    depends_on:
      platform:
        condition: service_healthy

  # --- Caddy reverse proxy (localhost, no TLS) ---
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - paperclip
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- BTCPay Server (crypto payments — self-hosted, zero fees) ---
  # Stack: bitcoind (regtest) → nbxplorer (indexer) → btcpayserver
  # BTCPay uses the same postgres instance with a separate database.

  bitcoind:
    image: btcpayserver/bitcoin:30.2
    restart: unless-stopped
    environment:
      BITCOIN_NETWORK: regtest
      BITCOIN_WALLETDIR: /data/wallets
      BITCOIN_EXTRA_ARGS: |-
        server=1
        rpcuser=btcpay
        rpcpassword=btcpay-local
        rpcallowip=0.0.0.0/0
        rpcbind=0.0.0.0
        fallbackfee=0.0002
    volumes:
      - bitcoin-data:/data
    networks:
      - paperclip

  nbxplorer:
    image: nicolasdorier/nbxplorer:2.6.1
    restart: unless-stopped
    environment:
      NBXPLORER_NETWORK: regtest
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://bitcoind:18443/
      NBXPLORER_BTCRPCUSER: btcpay
      NBXPLORER_BTCRPCPASSWORD: btcpay-local
      NBXPLORER_BTCNODEENDPOINT: bitcoind:18444
      NBXPLORER_POSTGRES: User ID=paperclip;Password=${POSTGRES_PASSWORD:-paperclip-local};Include Error Detail=true;Host=postgres;Port=5432;Database=nbxplorer
      NBXPLORER_AUTOMIGRATE: "1"
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_NOAUTH: "1"
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started
    networks:
      - paperclip

  btcpay:
    image: btcpayserver/btcpayserver:2.3.5
    restart: unless-stopped
    ports:
      - "14142:23002"
    environment:
      BTCPAY_NETWORK: regtest
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: User ID=paperclip;Password=${POSTGRES_PASSWORD:-paperclip-local};Include Error Detail=true;Host=postgres;Port=5432;Database=btcpayserver
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838/
      BTCPAY_BIND: 0.0.0.0:23002
      BTCPAY_ALLOW-ADMIN-REGISTRATION: "true"
      BTCPAY_DISABLE-REGISTRATION: "false"
    depends_on:
      - nbxplorer
    networks:
      - paperclip
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:23002/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- Anvil (Base mainnet fork for stablecoin testing) ---
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: >
      --fork-url https://mainnet.base.org
      --host 0.0.0.0
      --port 8545
      --chain-id 8453
    ports:
      - "8545:8545"
    networks:
      - paperclip

  # --- Seed Paperclip container (for testing provision flow) ---
  seed:
    image: ${PAPERCLIP_IMAGE:-paperclip-managed:local}
    container_name: wopr-seed
    environment:
      PORT: "3100"
      HOST: "0.0.0.0"
      NODE_ENV: production
      WOPR_PROVISION_SECRET: ${PROVISION_SECRET:-local-dev-secret-change-me}
      WOPR_GATEWAY_URL: ${GATEWAY_URL:-https://api.wopr.network/v1}
      PAPERCLIP_DEPLOYMENT_MODE: hosted_proxy
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      BETTER_AUTH_SECRET: local-seed-secret-not-for-production
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_HOSTED_MODE: "true"
      DATABASE_URL: postgresql://paperclip:${POSTGRES_PASSWORD:-paperclip-local}@postgres:5432/paperclip_seed
    volumes:
      - seed-data:/paperclip
    networks:
      - paperclip
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3100/internal/provision/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  paperclip:
    name: paperclip
    driver: bridge

volumes:
  postgres-data:
  fleet-data:
  caddy-data:
  caddy-config:
  seed-data:
  bitcoin-data:
