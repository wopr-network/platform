## Production / staging deployment for the nemoclaw platform.
##
## Same file for both environments — only the `.env` file differs.
##
## Run:
##   docker compose up -d
##
## Load env from file:
##   docker compose --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=nemoclaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=nemoclaw_platform
      - POSTGRES_MULTIPLE_DATABASES=nbxplorer,btcpayserver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemoclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nemoclaw-platform:
    image: ghcr.io/wopr-network/nemoclaw-platform:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - platform_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://nemoclaw:${POSTGRES_PASSWORD}@postgres:5432/nemoclaw_platform
      - NEMOCLAW_IMAGE=${NEMOCLAW_IMAGE:-ghcr.io/wopr-network/nemoclaw:latest}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api.${DOMAIN}
      - UI_ORIGIN=https://${DOMAIN},https://app.${DOMAIN}
      - PLATFORM_DOMAIN=${DOMAIN}
      - COOKIE_DOMAIN=.${DOMAIN}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@nemopod.com}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_DEFAULT_PRICE_ID=${STRIPE_DEFAULT_PRICE_ID}
      - PLATFORM_SECRET=${PLATFORM_SECRET}
      - PLATFORM_ENCRYPTION_SECRET=${PLATFORM_ENCRYPTION_SECRET}
      - PROVISION_SECRET=${PROVISION_SECRET}
      - GATEWAY_URL=${GATEWAY_URL}
      - METER_WAL_PATH=/data/meter-wal.jsonl
      - METER_DLQ_PATH=/data/meter-dlq.jsonl
      - NODE_ENV=production
      - PLATFORM_UI_URL=https://app.nemopod.com
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BTCPAY_API_KEY=${BTCPAY_API_KEY}
      - BTCPAY_BASE_URL=${BTCPAY_BASE_URL}
      - BTCPAY_STORE_ID=${BTCPAY_STORE_ID}
      - BTCPAY_WEBHOOK_SECRET=${BTCPAY_WEBHOOK_SECRET}
      - EVM_XPUB=${EVM_XPUB}
      - EVM_RPC_URL=${EVM_RPC_URL:-https://eth.llamarpc.com}
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Bitcoind (mainnet for production)
  # ---------------------------------------------------------------------------
  bitcoind:
    image: btcpayserver/bitcoin:30.2
    restart: unless-stopped
    environment:
      BITCOIN_WALLETDIR: /data/wallets
      CREATE_WALLET: "false"
      BITCOIN_EXTRA_ARGS: |-
        server=1
        rpcuser=btcpay
        rpcpassword=${BTCPAY_BITCOIND_PASSWORD:?Set BTCPAY_BITCOIND_PASSWORD in .env}
        rpcallowip=0.0.0.0/0
        rpcbind=0.0.0.0
        fallbackfee=0.0002
        prune=550
    volumes:
      - bitcoin_data:/data

  # ---------------------------------------------------------------------------
  # NBXplorer (blockchain indexer for BTCPay)
  # ---------------------------------------------------------------------------
  nbxplorer:
    image: nicolasdorier/nbxplorer:2.6.1
    restart: unless-stopped
    environment:
      NBXPLORER_NETWORK: mainnet
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://bitcoind:8332/
      NBXPLORER_BTCRPCUSER: btcpay
      NBXPLORER_BTCRPCPASSWORD: ${BTCPAY_BITCOIND_PASSWORD}
      NBXPLORER_BTCNODEENDPOINT: bitcoind:8333
      NBXPLORER_POSTGRES: User ID=nemoclaw;Password=${POSTGRES_PASSWORD};Include Error Detail=true;Host=postgres;Port=5432;Database=nbxplorer
      NBXPLORER_AUTOMIGRATE: "1"
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_NOAUTH: "1"
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started

  # ---------------------------------------------------------------------------
  # BTCPay Server (crypto payments)
  # ---------------------------------------------------------------------------
  btcpay:
    image: btcpayserver/btcpayserver:2.3.5
    restart: unless-stopped
    ports:
      - "14142:23002"
    environment:
      BTCPAY_NETWORK: mainnet
      BTCPAY_CHAINS: btc
      BTCPAY_POSTGRES: User ID=nemoclaw;Password=${POSTGRES_PASSWORD};Include Error Detail=true;Host=postgres;Port=5432;Database=btcpayserver
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838/
      BTCPAY_BIND: 0.0.0.0:23002
      BTCPAY_ALLOW-ADMIN-REGISTRATION: "true"
      BTCPAY_DISABLE-REGISTRATION: "false"
    depends_on:
      - nbxplorer
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:23002/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  platform_data:
  postgres_data:
  bitcoin_data:

networks:
  default:
    name: nemoclaw-platform
