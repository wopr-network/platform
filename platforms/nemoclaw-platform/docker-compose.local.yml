## Local development override — builds images from source instead of pulling GHCR.
##
## Run:
##   docker compose -f docker-compose.yml -f docker-compose.local.yml --env-file .env.local up --build
##
## Or use the helper script:
##   ./scripts/local-up.sh

services:
  postgres:
    ports:
      - "5432:5432"

  nemoclaw-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: nemoclaw-platform:local
    user: root
    environment:
      - DATABASE_URL=postgresql://nemoclaw:${POSTGRES_PASSWORD}@postgres:5432/nemoclaw_platform
      - BETTER_AUTH_URL=http://localhost:3100
      - UI_ORIGIN=http://localhost:3000
      - PLATFORM_DOMAIN=localhost
      - COOKIE_DOMAIN=localhost
      - NODE_ENV=development

  nemoclaw-ui:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.31.0 --activate && pnpm install && pnpm dev"
    volumes:
      - ../nemoclaw-platform-ui:/app
      - nemoclaw_ui_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ../nemoclaw-platform-ui/.env.brand
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3100
      - INTERNAL_API_URL=http://nemoclaw-platform:3100
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${BETTER_AUTH_SECRET}
      - NODE_ENV=development
    depends_on:
      - nemoclaw-platform
    networks:
      - default

volumes:
  nemoclaw_ui_node_modules:
