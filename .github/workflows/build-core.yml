name: Build Core Server Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "platforms/core-server/**"
      - "platforms/holyship/**"
      - "shells/**"
      - "ops/core-server/**"
      - ".github/workflows/build-core.yml"

concurrency:
  group: build-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: core-server
            dockerfile: platforms/core-server/Dockerfile
          - image: wopr-ui
            dockerfile: shells/wopr-platform-ui/Dockerfile
          - image: paperclip-ui
            dockerfile: shells/paperclip-platform-ui/Dockerfile
          - image: nemoclaw-ui
            dockerfile: shells/nemoclaw-platform-ui/Dockerfile
          - image: holyship-ui
            dockerfile: shells/holyship-platform-ui/Dockerfile
          - image: holyship
            dockerfile: platforms/holyship/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.wopr.bot
        uses: docker/login-action@v3
        with:
          registry: registry.wopr.bot
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.wopr.bot/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
