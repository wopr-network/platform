name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.wopr.bot -u wopr --password-stdin

      - name: Build and push all images
        run: |
          FAILED=0
          BUILT=()

          build() {
            local name="$1" tag="$2" dockerfile="$3" context="$4"
            echo "=== Building $name:$tag ==="
            if docker build -f "$dockerfile" -t "registry.wopr.bot/$name:$tag" "$context"; then
              echo "  Pushing $name:$tag..."
              docker push "registry.wopr.bot/$name:$tag"
              BUILT+=("$name:$tag")
            else
              echo "::error::Build failed: $name:$tag"
              FAILED=$((FAILED + 1))
            fi
          }

          # Monorepo images (context: .)
          build core-server    latest  platforms/core-server/Dockerfile              .
          build paperclip      managed sidecars/paperclip/Dockerfile.managed         .
          build holyship       latest  platforms/holyship/Dockerfile                 .
          build paperclip-ui   latest  shells/paperclip-platform-ui/Dockerfile       .
          build wopr-ui        latest  shells/wopr-platform-ui/Dockerfile            .
          build holyship-ui    latest  shells/holyship-platform-ui/Dockerfile        .
          build nemoclaw-ui    latest  shells/nemoclaw-platform-ui/Dockerfile        .

          # Standalone sidecars
          build wopr           managed sidecars/wopr/Dockerfile                      sidecars/wopr/
          build holyshipper    managed sidecars/holyshipper/Dockerfile.managed        sidecars/holyshipper/
          build nemoclaw       managed sidecars/nemoclaw/Dockerfile                  sidecars/nemoclaw/

          # Infrastructure
          build caddy-cf       latest  ops/core-server/Dockerfile.caddy              ops/core-server/

          echo ""
          echo "=== Summary ==="
          echo "Built: ${#BUILT[@]} / 11"
          echo "Failed: $FAILED"
          for img in "${BUILT[@]}"; do echo "  ✓ $img"; done

          if [ $FAILED -gt 0 ]; then
            echo "::warning::$FAILED image(s) failed to build"
          fi

      - name: Clean up build cache
        if: always()
        run: docker image prune -f

  deploy:
    needs: build-and-push
    if: always() && needs.build-and-push.result != 'cancelled'
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Deploy to production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@138.68.30.247 bash -s <<'DEPLOY'
          set -euo pipefail
          cd /opt/core-server

          echo "=== Pulling images ==="
          docker compose pull

          echo "=== Recreating core services ==="
          docker compose up -d --force-recreate --no-deps postgres
          docker compose up -d --force-recreate --no-deps core

          echo "=== Waiting for core health ==="
          for i in $(seq 1 30); do
            if docker compose exec -T core curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Core healthy"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 5
          done

          echo "=== Recreating UI + infra services ==="
          docker compose up -d --force-recreate --no-deps caddy
          docker compose up -d --force-recreate --no-deps paperclip-ui wopr-ui nemoclaw-ui || true
          docker compose up -d --force-recreate --no-deps holyship holyship-ui || echo "::warning::holyship unhealthy — skipping"

          echo "=== Killing pool containers (will auto-replenish with new images) ==="
          docker ps --filter "name=pool-" --format '{{.Names}}' | while read -r name; do
            echo "  Stopping $name"
            docker rm -f "$name" 2>/dev/null || true
          done

          echo "=== Cleanup ==="
          docker image prune -f

          echo "Deploy complete"
          DEPLOY

      - name: Verify pool replenishment
        run: |
          sleep 30
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@138.68.30.247 \
            "docker ps --filter 'name=pool-' --format '{{.Names}}\t{{.Image}}\t{{.Status}}'"
