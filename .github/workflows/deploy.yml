name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.wopr.bot -u wopr --password-stdin

      - name: Build and push all images
        run: |
          FAILED=0
          BUILT=()

          build() {
            local name="$1" tag="$2" dockerfile="$3" context="$4"
            shift 4
            echo "=== Building $name:$tag ==="
            # Remaining args are --build-arg KEY=VAL pairs for the image.
            if docker build "$@" -f "$dockerfile" -t "registry.wopr.bot/$name:$tag" "$context"; then
              echo "  Pushing $name:$tag..."
              docker push "registry.wopr.bot/$name:$tag"
              BUILT+=("$name:$tag")
            else
              echo "::error::Build failed: $name:$tag"
              FAILED=$((FAILED + 1))
            fi
          }

          # Monorepo images (context: .)
          # UI images bake INTERNAL_API_URL into the Next standalone build so
          # rewrites() resolves to the right upstream service on the prod
          # network. holyship-ui talks to the engine; others talk to core.
          build core-server    latest  platforms/core-server/Dockerfile              .
          build paperclip      managed sidecars/paperclip/Dockerfile.managed         .
          build holyship       latest  platforms/holyship/Dockerfile                 .
          build paperclip-ui   latest  shells/paperclip-platform-ui/Dockerfile       . --build-arg INTERNAL_API_URL=http://core:3001
          build wopr-ui        latest  shells/wopr-platform-ui/Dockerfile            . --build-arg INTERNAL_API_URL=http://core:3001
          build holyship-ui    latest  shells/holyship-platform-ui/Dockerfile        . --build-arg INTERNAL_API_URL=http://holyship:3005
          build nemoclaw-ui    latest  shells/nemoclaw-platform-ui/Dockerfile        . --build-arg INTERNAL_API_URL=http://core:3001

          # Standalone sidecars
          build wopr           managed sidecars/wopr/Dockerfile                      sidecars/wopr/
          build holyshipper    managed sidecars/holyshipper/Dockerfile.managed        sidecars/holyshipper/
          build nemoclaw       managed sidecars/nemoclaw/Dockerfile                  sidecars/nemoclaw/

          # Services
          build chain-server   latest  services/platform-crypto-server/Dockerfile    .

          # Agents
          build node-agent     latest  core/platform-core/Dockerfile.node-agent      .

          # Infrastructure
          build caddy-cf       latest  ops/core-server/Dockerfile.caddy              ops/core-server/

          echo ""
          echo "=== Summary ==="
          echo "Built: ${#BUILT[@]} / 13"
          echo "Failed: $FAILED"
          for img in "${BUILT[@]}"; do echo "  ✓ $img"; done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED image(s) failed to build — refusing to deploy stale images"
            exit 1
          fi

      - name: Clean up build cache
        if: always()
        run: docker image prune -f

  deploy:
    needs: build-and-push
    # Block deploy if any image failed to build. Previous behavior was
    # `always() && != 'cancelled'`, which allowed stale images to ship
    # silently — chain-server:latest sat at 11 days old in prod without
    # anyone noticing. Now deploy only runs when every image pushed clean.
    if: needs.build-and-push.result == 'success'
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      # Falls back to the current IP if the variable isn't set, so deploys
      # don't break before the repo variable is configured. Move to a pure
      # `vars.PROD_VPS_HOST` once configured in repo settings.
      PROD_VPS_HOST: ${{ vars.PROD_VPS_HOST || '138.68.30.247' }}
      CHAIN_VPS_HOST: ${{ vars.CHAIN_VPS_HOST || '167.71.118.221' }}
    steps:
      - name: Deploy to production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Sync compose + Caddy config from the repo to the VPS. The VPS used
          # to hold a stale hand-edited compose file that was missing services
          # (e.g. holyship), so the engine was never actually deployed even
          # after the image had been built for months. Treat ops/core-server/
          # as source of truth — repo edits reach prod.
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            ops/core-server/docker-compose.prod.yml \
            ops/core-server/Caddyfile \
            "root@${PROD_VPS_HOST}:/opt/core-server/"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@${PROD_VPS_HOST}" bash -s <<'DEPLOY'
          set -euo pipefail
          cd /opt/core-server

          echo "=== Pulling all images ==="
          docker compose -f docker-compose.prod.yml pull

          echo "=== Recreating all services ==="
          docker compose -f docker-compose.prod.yml up -d --force-recreate || echo "::warning::Some containers unhealthy — continuing"

          echo "=== Reloading Caddy (picks up Caddyfile changes) ==="
          if ! docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile < /dev/null; then
            echo "::warning::Caddy reload failed — restarting container"
            docker compose -f docker-compose.prod.yml restart caddy
          fi

          echo "=== Waiting for core health ==="
          # NOTE: `< /dev/null` is critical — `docker compose exec -T` inherits stdin
          # from the heredoc and would otherwise consume the rest of the script.
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T core curl -sf http://localhost:3001/health > /dev/null 2>&1 < /dev/null; then
              echo "Core healthy"
              break
            fi
            echo "  Waiting... ($i/30)"
            sleep 5
          done

          echo "=== Killing pool containers (will auto-replenish with new images) ==="
          docker ps --filter "name=pool-" --format '{{.Names}}' | while read -r name; do
            echo "  Stopping $name"
            docker rm -f "$name" 2>/dev/null || true
          done

          echo "=== Cleanup ==="
          docker image prune -f

          echo "Deploy complete"
          DEPLOY

      - name: Deploy chain server
        run: |
          # Sync compose from repo — same pattern as core-server. Prevents the VPS
          # from drifting to a stale hand-edited file (e.g. wrong image registry).
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            ops/vps/chain-server/docker-compose.yml \
            "root@${CHAIN_VPS_HOST}:/opt/chain-server/docker-compose.yml"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@${CHAIN_VPS_HOST}" bash -s "$REGISTRY_PASSWORD" <<'CHAIN_DEPLOY'
          set -euo pipefail
          echo "$1" | docker login registry.wopr.bot -u wopr --password-stdin
          docker pull registry.wopr.bot/chain-server:latest
          cd /opt/chain-server
          docker compose up -d crypto --force-recreate
          echo "=== Waiting for crypto health ==="
          # `< /dev/null` prevents docker exec from consuming the heredoc stdin
          for i in $(seq 1 12); do
            if docker exec chain-crypto curl -sf http://localhost:3100/chains > /dev/null 2>&1 < /dev/null; then
              echo "Chain server healthy"
              break
            fi
            echo "  Waiting... ($i/12)"
            sleep 5
          done
          docker image prune -f
          echo "Chain deploy complete"
          CHAIN_DEPLOY
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Verify pool replenishment
        run: |
          sleep 30
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@${PROD_VPS_HOST}" \
            "docker ps --filter 'name=pool-' --format '{{.Names}}\t{{.Image}}\t{{.Status}}'"
