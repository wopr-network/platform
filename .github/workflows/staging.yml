name: Build & Deploy Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io/wopr-network

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed products
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          ITEMS=()

          # Core changes affect ALL products
          if echo "$CHANGED_FILES" | grep -q "^core/"; then
            echo 'matrix={"include":[{"product":"wopr","api":"wopr-platform","ui":"wopr-platform-ui","api_dockerfile":"platforms/wopr-platform/Dockerfile","ui_dockerfile":"shells/wopr-platform-ui/Dockerfile","host":"138.68.30.247"},{"product":"paperclip","api":"paperclip-platform","ui":"paperclip-platform-ui","api_dockerfile":"platforms/paperclip-platform/Dockerfile","ui_dockerfile":"shells/paperclip-platform-ui/Dockerfile","host":"68.183.160.201"},{"product":"holyship","api":"holyship","ui":"holyship-platform-ui","api_dockerfile":"platforms/holyship/Dockerfile","ui_dockerfile":"shells/holyship-platform-ui/Dockerfile","host":"138.68.46.192"},{"product":"nemoclaw","api":"nemoclaw-platform","ui":"nemoclaw-platform-ui","api_dockerfile":"platforms/nemoclaw-platform/Dockerfile","ui_dockerfile":"shells/nemoclaw-platform-ui/Dockerfile","host":"167.172.208.149"}]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          add_product() {
            local p=$1 api=$2 ui=$3 api_df=$4 ui_df=$5 host=$6
            ITEMS+=("{\"product\":\"$p\",\"api\":\"$api\",\"ui\":\"$ui\",\"api_dockerfile\":\"$api_df\",\"ui_dockerfile\":\"$ui_df\",\"host\":\"$host\"}")
          }

          echo "$CHANGED_FILES" | grep -q "^platforms/wopr-platform/\|^shells/wopr-platform-ui/" && \
            add_product wopr wopr-platform wopr-platform-ui platforms/wopr-platform/Dockerfile shells/wopr-platform-ui/Dockerfile 138.68.30.247
          echo "$CHANGED_FILES" | grep -q "^platforms/paperclip-platform/\|^shells/paperclip-platform-ui/" && \
            add_product paperclip paperclip-platform paperclip-platform-ui platforms/paperclip-platform/Dockerfile shells/paperclip-platform-ui/Dockerfile 68.183.160.201
          echo "$CHANGED_FILES" | grep -q "^platforms/holyship/\|^shells/holyship-platform-ui/" && \
            add_product holyship holyship holyship-platform-ui platforms/holyship/Dockerfile shells/holyship-platform-ui/Dockerfile 138.68.46.192
          echo "$CHANGED_FILES" | grep -q "^platforms/nemoclaw-platform/\|^shells/nemoclaw-platform-ui/" && \
            add_product nemoclaw nemoclaw-platform nemoclaw-platform-ui platforms/nemoclaw-platform/Dockerfile shells/nemoclaw-platform-ui/Dockerfile 167.172.208.149

          # Service changes affect their consumers
          if echo "$CHANGED_FILES" | grep -q "^services/provision-client/"; then
            add_product wopr wopr-platform wopr-platform-ui platforms/wopr-platform/Dockerfile shells/wopr-platform-ui/Dockerfile 138.68.30.247
            add_product paperclip paperclip-platform paperclip-platform-ui platforms/paperclip-platform/Dockerfile shells/paperclip-platform-ui/Dockerfile 68.183.160.201
            add_product nemoclaw nemoclaw-platform nemoclaw-platform-ui platforms/nemoclaw-platform/Dockerfile shells/nemoclaw-platform-ui/Dockerfile 167.172.208.149
          fi

          if [ ${#ITEMS[@]} -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            # Deduplicate by product name, compact output (single line)
            UNIQUE=$(printf '%s\n' "${ITEMS[@]}" | jq -s -c 'unique_by(.product)')
            echo "matrix={\"include\":$UNIQUE}" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: self-hosted
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          SHA="${{ github.sha }}"
          echo "short_sha=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # --- Build & push API image ---
      - name: Build and push API :staging
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.api_dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.api }}:staging
            ${{ env.REGISTRY }}/${{ matrix.api }}:${{ steps.version.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.api }}
          cache-to: type=gha,mode=max,scope=${{ matrix.api }}

      # --- Build & push UI image ---
      - name: Build and push UI :staging
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.ui_dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.ui }}:staging
            ${{ env.REGISTRY }}/${{ matrix.ui }}:${{ steps.version.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.ui }}
          cache-to: type=gha,mode=max,scope=${{ matrix.ui }}

      # --- Deploy to staging VPS ---
      - name: Deploy staging
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          HOST="${{ matrix.host }}"
          PRODUCT="${{ matrix.product }}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "root@$HOST" bash -s <<DEPLOY
          set -euo pipefail
          case "$PRODUCT" in
            wopr)      DIR=/opt/wopr-platform;     DB=wopr_platform;     PGUSER=wopr ;;
            paperclip) DIR=/opt/paperclip-platform; DB=paperclip_platform; PGUSER=paperclip ;;
            holyship)  DIR=/opt/holyship;           DB=holyship;          PGUSER=holyship ;;
            nemoclaw)  DIR=/opt/nemoclaw-platform;  DB=nemoclaw_platform; PGUSER=nemoclaw ;;
          esac
          cd "\$DIR"
          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
          \$COMPOSE stop staging-api 2>/dev/null || true
          \$COMPOSE pull staging-api staging-ui 2>/dev/null || \$COMPOSE pull staging-api
          \$COMPOSE up -d staging-postgres
          sleep 3
          \$COMPOSE exec -T staging-postgres psql -U "\$PGUSER" -d "\$DB" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" 2>/dev/null || true
          docker compose exec -T postgres pg_dump -U "\$PGUSER" --no-owner --no-acl "\$DB" | \
            \$COMPOSE exec -T staging-postgres psql -U "\$PGUSER" -d "\$DB" -q
          \$COMPOSE up -d staging-api staging-ui 2>/dev/null || \$COMPOSE up -d staging-api
          docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || docker compose restart caddy
          echo "Staging deployed for $PRODUCT"
          DEPLOY

      - name: Summary
        run: |
          echo "## Staging build & deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Product:** ${{ matrix.product }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**SHA:** ${{ steps.version.outputs.short_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Images" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.REGISTRY }}/${{ matrix.api }}:staging\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.REGISTRY }}/${{ matrix.ui }}:staging\`" >> "$GITHUB_STEP_SUMMARY"
