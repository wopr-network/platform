name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pin to match packageManager field in root package.json (pnpm@10.31.0).
          # action-setup@v6's default pnpm is v11, which rejects our lockfileVersion: '9.0'
          # with "broken lockfile: expected a single document in the stream, but found more".
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (affected)
        run: pnpm turbo run lint --filter='...[origin/main]'

      - name: Build (affected)
        run: pnpm turbo run build --filter='...[origin/main]'

      - name: Test (affected)
        run: pnpm turbo run test --filter='...[origin/main]'
