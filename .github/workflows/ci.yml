name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        # Pinned to v5 — action-setup@v6 bumped the bootstrap pnpm to v11, which
        # rejects our lockfile with ERR_PNPM_BROKEN_LOCKFILE even though the
        # resolved version from packageManager is pnpm@10.31.0. Passing an
        # explicit `version:` input collides with packageManager and fails with
        # ERR_PNPM_BAD_PM_VERSION. Simplest fix is to stay on v5 until the
        # monorepo upgrades its lockfile.
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (affected)
        run: pnpm turbo run lint --filter='...[origin/main]'

      - name: Build (affected)
        run: pnpm turbo run build --filter='...[origin/main]'

      - name: Test (affected)
        run: pnpm turbo run test --filter='...[origin/main]'
