version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/core/*"
      - "/platforms/*"
      - "/shells/*"
      - "/services/*"
      - "/sidecars/wopr"
      - "/sidecars/wopr/packages/*"
      - "/sidecars/holyshipper"
      - "/sidecars/paperclip"
      - "/sidecars/paperclip/packages/*"
      - "/sidecars/paperclip/packages/adapters/*"
      - "/sdks/*"
      - "/apps/*"
    schedule:
      interval: "daily"
    groups:
      production-deps:
        applies-to: version-updates
        dependency-type: production
        patterns: ["*"]
      dev-tooling:
        applies-to: version-updates
        dependency-type: development
        patterns: ["*"]
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
